<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Consulta Nacional de Processos</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
max-width:950px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
margin-right:10px;
margin-top:10px;
width:200px;
}

button{
padding:10px 20px;
background:#4f46e5;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f0f0f0;
}

.status{
margin-top:15px;
font-weight:bold;
}

.link{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Consulta Nacional de Processos</h1>
<p>Pesquisa interna para análise de devedores</p>

<input id="nome" placeholder="Nome do devedor">

<input id="cpf" placeholder="CPF">

<input id="processo" placeholder="Número do processo">

<select id="estado">
<option value="SP">São Paulo</option>
<option value="MG">Minas Gerais</option>
<option value="RJ">Rio de Janeiro</option>
<option value="PR">Paraná</option>
</select>

<br><br>

<button onclick="consultar()">Consultar</button>

<div class="status" id="status"></div>

<table>

<thead>
<tr>
<th>Tribunal</th>
<th>Processo</th>
<th>Classe</th>
<th>Assunto</th>
<th>Banco</th>
</tr>
</thead>

<tbody id="resultado"></tbody>

</table>

<div class="link" id="linkProcesso"></div>

</div>

<script>

async function consultar(){

let numero = document.getElementById("processo").value

if(!numero){

document.getElementById("status").innerHTML="Informe o número do processo."
return

}

document.getElementById("status").innerHTML="Consultando..."

try{

let url = "https://consulta-processos-dxx8.onrender.com/processo?numero="+numero

let resposta = await fetch(url)

let dados = await resposta.json()

if(!dados.resultado){

document.getElementById("status").innerHTML="Processo não encontrado."
return

}

let r = dados.resultado

document.getElementById("resultado").innerHTML = `
<tr>
<td>${r.tribunal}</td>
<td>${r.processo}</td>
<td>${r.classe}</td>
<td>${r.assunto}</td>
<td>${r.banco}</td>
</tr>
`

document.getElementById("status").innerHTML="Consulta realizada com sucesso."

/* EXTRAIR FORO AUTOMATICAMENTE */

let partes = numero.split(".")
let foro = partes[partes.length-1]

foro = parseInt(foro)

/* GERAR LINK TJSP */

let link = "https://esaj.tjsp.jus.br/cpopg/show.do?processo.foro="+foro+"&processo.numero="+numero

document.getElementById("linkProcesso").innerHTML =
`<a href="${link}" target="_blank">Abrir processo no TJSP</a>`

}catch(e){

document.getElementById("status").innerHTML="Erro na consulta."

}

}

</script>

</body>
</html>
