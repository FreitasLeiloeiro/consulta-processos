<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta Nacional de Processos</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
margin-bottom:5px;
}

.sub{
color:#666;
margin-bottom:20px;
}

input,select{
padding:10px;
width:250px;
margin-right:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#3b5bdb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2f4cc7;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="container">

<h1>Consulta Nacional de Processos</h1>
<div class="sub">Pesquisa por nome e CPF do devedor</div>

<input id="nome" placeholder="Nome do devedor">

<input id="cpf" placeholder="CPF">

<select id="estado">

<option value="SP">São Paulo</option>
<option value="MG">Minas Gerais</option>
<option value="RJ">Rio de Janeiro</option>
<option value="PR">Paraná</option>
<option value="RS">Rio Grande do Sul</option>
<option value="SC">Santa Catarina</option>
<option value="BA">Bahia</option>
<option value="GO">Goiás</option>
<option value="PE">Pernambuco</option>
<option value="CE">Ceará</option>
<option value="PA">Pará</option>
<option value="MT">Mato Grosso</option>
<option value="MS">Mato Grosso do Sul</option>
<option value="ES">Espírito Santo</option>
<option value="DF">Distrito Federal</option>

</select>

<button onclick="consultar()">Consultar</button>

<div id="resultado"></div>

<table id="tabela" style="display:none">

<thead>
<tr>
<th>Processo</th>
<th>Tribunal</th>
<th>Classe</th>
<th>Assunto</th>
<th>Data</th>
<th>Banco</th>
</tr>
</thead>

<tbody id="dados"></tbody>

</table>

</div>

<script>

async function consultar(){

const nome = document.getElementById("nome").value
const cpf = document.getElementById("cpf").value
const estado = document.getElementById("estado").value

document.getElementById("resultado").innerHTML="Consultando..."

const url =
"https://consulta-processos-dxx8.onrender.com/consulta?nome="
+ encodeURIComponent(nome)
+ "&cpf="
+ encodeURIComponent(cpf)
+ "&estado="
+ estado

const resposta = await fetch(url)

const data = await resposta.json()

document.getElementById("resultado").innerHTML =
"Processos encontrados: " + data.total

const tabela = document.getElementById("tabela")
const tbody = document.getElementById("dados")

tbody.innerHTML=""

data.resultados.forEach(p => {

const linha =
"<tr>" +
"<td>"+p.processo+"</td>"+
"<td>"+p.tribunal+"</td>"+
"<td>"+p.classe+"</td>"+
"<td>"+p.assunto+"</td>"+
"<td>"+p.data+"</td>"+
"<td>"+p.banco+"</td>"+
"</tr>"

tbody.innerHTML += linha

})

tabela.style.display="table"

}

</script>

</body>
</html>
