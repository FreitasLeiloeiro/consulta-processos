<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta Nacional de Processos</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

input,select{
padding:10px;
margin-right:10px;
width:200px;
}

button{
padding:10px 20px;
background:#3b5cff;
border:none;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="container">

<h1>Consulta Nacional de Processos</h1>
<p>Pesquisa interna para análise de devedores</p>

<input id="nome" placeholder="Nome do devedor">

<input id="cpf" placeholder="CPF">

<select id="estado">

<option value="SP">São Paulo</option>
<option value="MG">Minas Gerais</option>
<option value="RJ">Rio de Janeiro</option>
<option value="PR">Paraná</option>
<option value="RS">Rio Grande do Sul</option>

</select>

<button onclick="consultar()">Consultar</button>

<table id="tabela">

<thead>
<tr>
<th>Tribunal</th>
<th>Processo</th>
<th>Classe</th>
<th>Assunto</th>
<th>Banco</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

async function consultar(){

let nome = document.getElementById("nome").value
let cpf = document.getElementById("cpf").value
let estado = document.getElementById("estado").value

let url = "https://consulta-processos-dxx8.onrender.com/consulta?nome="+nome+"&cpf="+cpf+"&estado="+estado

let resposta = await fetch(url)

let dados = await resposta.json()

let tabela = document.querySelector("#tabela tbody")

tabela.innerHTML=""

dados.resultados.forEach(p => {

let linha = `
<tr>
<td>${p.tribunal}</td>
<td>${p.processo}</td>
<td>${p.classe}</td>
<td>${p.assunto}</td>
<td>${p.banco}</td>
</tr>
`

tabela.innerHTML += linha

})

}

</script>

</body>
</html>
